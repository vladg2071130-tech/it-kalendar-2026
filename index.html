<!DOCTYPE html>
<html lang="be">
<head>
    <meta charset="UTF-8">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            padding: 15px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        .header {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 25px;
            text-align: center;
            border-bottom: 4px solid #ffd966;
        }
        .header h1 { font-size: 2.2em; }
        .stats {
            display: flex;
            justify-content: space-around;
            padding: 15px;
            background: #e3ecff;
            margin: 15px;
            border-radius: 40px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .stat-item { text-align: center; min-width: 100px; }
        .stat-number {
            font-size: 1.8em;
            font-weight: bold;
            color: #1e3c72;
        }
        .month-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #f0f5ff;
        }
        .month-nav button {
            background: #1e3c72;
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 1.6em;
            cursor: pointer;
            transition: 0.2s;
        }
        .month-nav button:hover {
            background: #2a5298;
            transform: scale(1.05);
        }
        .month-nav h2 {
            font-size: 2em;
            color: #1e3c72;
        }
        .month-btns {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 0 15px 15px;
        }
        .month-btn {
            padding: 6px 12px;
            border: 2px solid #1e3c72;
            background: white;
            color: #1e3c72;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9em;
        }
        .month-btn.active {
            background: #1e3c72;
            color: white;
        }
        .calendar {
            padding: 15px;
        }
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            margin-bottom: 10px;
        }
        .weekday {
            background: #d9e4ff;
            color: #1e3c72;
            font-weight: bold;
            text-align: center;
            padding: 10px 5px;
            border-radius: 8px;
            font-size: 0.9em;
        }
        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }
        .day {
            background: #f8faff;
            border: 2px solid #d0dfff;
            border-radius: 10px;
            padding: 8px 4px;
            min-height: 95px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            transition: 0.15s;
        }
        .day:hover {
            border-color: #1e3c72;
            background: white;
            transform: translateY(-2px);
        }
        .day.red {
            background: #ffe6e6;
            border-color: #ff4757;
        }
        .day-number {
            font-weight: bold;
            font-size: 1.2em;
            color: #1e3c72;
            display: flex;
            justify-content: space-between;
            margin-bottom: 3px;
        }
        .day-term {
            background: #e3ecff;
            padding: 3px;
            border-radius: 5px;
            font-size: 0.75em;
            text-align: center;
            margin: 3px 0;
            border-left: 3px solid #1e3c72;
            word-break: break-word;
        }
        .day-badge {
            font-size: 0.7em;
            padding: 3px;
            border-radius: 15px;
            text-align: center;
            background: #ffd966;
            margin-top: auto;
        }
        .day-badge.passed {
            background: #2ecc71;
            color: white;
        }
        .panel {
            position: fixed;
            top: 0;
            right: -500px;
            width: 450px;
            height: 100vh;
            background: white;
            box-shadow: -5px 0 20px rgba(0,0,0,0.2);
            transition: 0.3s;
            padding: 25px;
            z-index: 1000;
            overflow-y: auto;
        }
        .panel.open { right: 0; }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #1e3c72;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

            font-size: 30px;
            cursor: pointer;
            color: #888;
        }
        .date-box {
            background: #1e3c72;
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .term-box {
            background: #e3ecff;
            padding: 20px;
            border-radius: 10px;
            border-left: 8px solid #1e3c72;
            margin-bottom: 20px;
        }
        .term-word {
            font-size: 2em;
            font-weight: bold;
            color: #1e3c72;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 20px 0;
        }
        .option {
            border: 2px solid #d0dfff;
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
        }
        .option:hover {
            border-color: #1e3c72;
        }
        .option.selected {
            border-color: #1e3c72;
            background: #e3ecff;
        }
        .option.correct {
            border-color: #2ecc71;
            background: #e8f8f0;
        }
        .option.incorrect {
            border-color: #e74c3c;
            background: #fde9e8;
        }
        .marker {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid #1e3c72;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-weight: bold;
        }
        .selected .marker {
            background: #1e3c72;
            color: white;
        }
        .check-btn {
            background: #1e3c72;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            font-size: 1.1em;
            cursor: pointer;
            margin-bottom: 10px;
        }
        .check-btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
        }
        .reset-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            width: 100%;
            cursor: pointer;
        }
        .result {
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
        }
        .result.correct {
            background: #e8f8f0;
            color: #27ae60;
        }
        .result.incorrect {
            background: #fde9e8;
            color: #c0392b;
        }
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }
        .overlay.show { display: block; }
        /* ========== СТЫЛІ ДЛЯ ПРОФІЛЮ (МАДАЛЬНАЕ АКНО) ========== */
.modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.5);
    animation: fadeIn 0.3s;
}

.modal-content {
    background: white;
    margin: 5% auto;
    padding: 30px;
    border-radius: 20px;
    max-width: 500px;
    position: relative;
    animation: slideIn 0.3s;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes slideIn {
    from { transform: translateY(-50px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

.achievement-badge {
    background: linear-gradient(135deg, #ffd966, #ffb347);
    color: #1e3c72;
    padding: 8px 15px;
    border-radius: 50px;
    font-size: 0.9em;
    font-weight: bold;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    display: inline-block;
    margin: 5px;
}
        @media (max-width: 700px) {
            .panel { width: 100%; right: -100%; }
            .day { min-height: 75px; font-size: 0.9em; }
        }

function addAchievement(id, name) {
    if (!userStats.achievements.includes(id)) {
        userStats.achievements.push(id);
        showNotification(`🏆 Дасягненне: ${name}`);
        // Бонусныя балы за дасягненне

        else if (id === 'streak_100') addPoints(100);
    }
}

function updateStreak() {
    const today = new Date().toDateString();
    
    if (!userStats.lastVisit) {
        userStats.streak = 1;
    } else {
        const lastDate = new Date(userStats.lastVisit);
        const currentDate = new Date();
        
        const diffTime = Math.abs(currentDate - lastDate);
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        
        if (diffDays === 1) {
            userStats.streak++;
            
            // Дасягненні за стрык
            if (userStats.streak === 7) {
                addAchievement('streak_7', '🎯 7 дзён запар');
            } else if (userStats.streak === 30) {
                addAchievement('streak_30', '🔥 30 дзён запар');
            } else if (userStats.streak === 100) {
                addAchievement('streak_100', '⚡ 100 дзён запар');
            }
        } else if (diffDays > 1) {
            userStats.streak = 1;
        }
    }
    
    userStats.lastVisit = today;
    localStorage.setItem('userStats', JSON.stringify(userStats));
    updateStatsDisplay();
}

function addPoints(points) {
    userStats.points += points;
    
    // Праверка павышэння ўзроўню
    let newLevel = 1;
    for (let i = 0; i < levelThresholds.length; i++) {
        if (userStats.points >= levelThresholds[i]) {
            newLevel = i + 1;
        }
    }
    
    if (newLevel > userStats.level) {
        userStats.level = newLevel;
        showNotification(`🎉 Віншую! Ты дасягнуў ${newLevel} ўзроўню: ${levelNames[newLevel-1]}`);

function showNotification(message) {
    const notification = document.createElement('div');
    notification.style.cssText = `
        position: fixed;
        top: 20px;
        right: 20px;
        background: #1e3c72;
        color: white;
        padding: 15px 25px;

        z-index: 10000;
        animation: slideIn 0.5s;
    `;
    notification.textContent = message;
    document.body.appendChild(notification);
    
    setTimeout(() => {
        notification.style.animation = 'slideOut 0.5s';
        setTimeout(() => notification.remove(), 500);
    }, 3000);
}

}

    } else {
        const lastDate = new Date(userStats.lastVisit);
        const currentDate = new Date();
        
        const diffTime = Math.abs(currentDate - lastDate);
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        
        if (diffDays === 1) {
            userStats.streak++;
        } else if (diffDays > 1) {
            userStats.streak = 1;
        }
    }
    
    userStats.lastVisit = today;
    localStorage.setItem('userStats', JSON.stringify(userStats));
    updateStatsDisplay();
}
// ========== ФУНКЦЫІ ДЛЯ ПРОФІЛЮ ==========
function openProfile() {
    updateProfileStats();
    document.getElementById('profileModal').style.display = 'block';
}

function closeProfile() {
    document.getElementById('profileModal').style.display = 'none';
}

function updateProfileStats() {
    document.getElementById('profilePoints').textContent = userStats.points;
    document.getElementById('profileDays').textContent = userStats.daysCompleted;
    document.getElementById('profileStreak').textContent = userStats.streak;
    
    document.getElementById('profileLevel').innerHTML = `🎓 Узровень ${userStats.level}: ${levelNames[userStats.level-1]}`;
    
    let currentLevelPoints = levelThresholds[userStats.level - 1];
    let nextLevelPoints = levelThresholds[userStats.level] || levelThresholds[levelThresholds.length-1];
    let pointsNeeded = nextLevelPoints - currentLevelPoints;
    let pointsProgress = userStats.points - currentLevelPoints;
    let progressPercent = Math.min(100, Math.round((pointsProgress / pointsNeeded) * 100));
    
    document.getElementById('progressBar').style.width = progressPercent + '%';
    document.getElementById('currentPoints').textContent = userStats.points + ' балаў';
    document.getElementById('nextLevelPoints').textContent = 'Мэта: ' + nextLevelPoints + ' балаў';
    
    let achievementsDiv = document.getElementById('achievementsList');
    achievementsDiv.innerHTML = '';
    
    if (userStats.achievements.length === 0) {
        achievementsDiv.innerHTML = '<p style="color: #888; width: 100%; text-align: center;">Пакуль няма дасягненняў</p>';
    } else {
        userStats.achievements.forEach(ach => {
            let achievementNames = {
                'streak_7': '🎯 7 дзён запар',
                'streak_30': '🔥 30 дзён запар',
                'streak_100': '⚡ 100 дзён запар'
            };
            
            let badge = document.createElement('span');
            badge.className = 'achievement-badge';
            badge.textContent = achievementNames[ach] || ach;
            achievementsDiv.appendChild(badge);
        });
    }
}

function resetAllProgress() {
    if (confirm('⚠️ Ты ўпэўнены, што хочаш скінуць увесь прагрэс? Гэта дзеянне нельга адмяніць!')) {
        localStorage.removeItem('userStats');
        localStorage.removeItem('res2026full');
        location.reload();
    }
}
// ========== ПАЛІПШАНАЯ ФУНКЦЫЯ ПРАВЕРКІ АДКАЗУ ==========
function checkAnswer() {
    if(!selectedDate || selectedOpt===null) return;
    
    let test = tests[selectedDate];
    if(!test) return;
    
    let correct = (selectedOpt === test.correct);
    let resDiv = document.getElementById('panelResult');
    
    if(correct) {
        resDiv.innerHTML = '✅ Правільна! +10 балаў';
        resDiv.className = 'result correct';
        
        // Калі гэты дзень яшчэ не быў пройдзены
        if (!results[selectedDate]) {
            addPoints(10); // Дадаем 10 балаў
            userStats.daysCompleted++;
            
            // Захоўваем вынік
            results[selectedDate] = {passed: true};
            localStorage.setItem('res2026full', JSON.stringify(results));
            
            // Абнаўляем каляндар і статыстыку
            renderCalendar();
            updateStats();
            updateStatsDisplay();
        }
    } else {
        resDiv.innerHTML = '❌ Неправільна';
        resDiv.className = 'result incorrect';
    }
    
    // Падсвечванне варыянтаў
    for(let j=0; j<4; j++) {
        let opt = document.getElementById('opt'+j);
        if(opt) {
            if(j === test.correct) opt.classList.add('correct');
            else if(j === selectedOpt && !correct) opt.classList.add('incorrect');
        }
    }
    document.getElementById('checkBtn').disabled = true;
}

    }
    @keyframes slideOut {

        to { transform: translateX(100%); opacity: 0; }
    }
`;
document.head.appendChild(style);
