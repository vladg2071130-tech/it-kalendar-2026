<!DOCTYPE html>
<html lang="be">
<head>
    <meta charset="UTF-8">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            padding: 15px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        .header {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 25px;
            text-align: center;
            border-bottom: 4px solid #ffd966;
        }
        .header h1 { font-size: 2.2em; }
        .stats {
            display: flex;
            justify-content: space-around;
            padding: 15px;
            background: #e3ecff;
            margin: 15px;
            border-radius: 40px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .stat-item { text-align: center; min-width: 100px; }
        .stat-number {
            font-size: 1.8em;
            font-weight: bold;
            color: #1e3c72;
        }
        .month-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #f0f5ff;
        }
        .month-nav button {
            background: #1e3c72;
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 1.6em;
            cursor: pointer;
            transition: 0.2s;
        }
        .month-nav button:hover {
            background: #2a5298;
            transform: scale(1.05);
        }
        .month-nav h2 {
            font-size: 2em;
            color: #1e3c72;
        }
        .month-btns {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 0 15px 15px;
        }
        .month-btn {
            padding: 6px 12px;
            border: 2px solid #1e3c72;
            background: white;
            color: #1e3c72;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9em;
        }
        .month-btn.active {
            background: #1e3c72;
            color: white;
        }
        .calendar {
            padding: 15px;
        }
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            margin-bottom: 10px;
        }
        .weekday {
            background: #d9e4ff;
            color: #1e3c72;
            font-weight: bold;
            text-align: center;
            padding: 10px 5px;
            border-radius: 8px;
            font-size: 0.9em;
        }
        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }
        .day {
            background: #f8faff;
            border: 2px solid #d0dfff;
            border-radius: 10px;
            padding: 8px 4px;
            min-height: 95px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            transition: 0.15s;
        }
        .day:hover {
            border-color: #1e3c72;
            background: white;
            transform: translateY(-2px);
        }
        .day.red {
            background: #ffe6e6;
            border-color: #ff4757;
        }
        .day-number {
            font-weight: bold;
            font-size: 1.2em;
            color: #1e3c72;
            display: flex;
            justify-content: space-between;
            margin-bottom: 3px;
        }
        .day-term {
            background: #e3ecff;
            padding: 3px;
            border-radius: 5px;
            font-size: 0.75em;
            text-align: center;
            margin: 3px 0;
            border-left: 3px solid #1e3c72;
            word-break: break-word;
        }
        .day-badge {
            font-size: 0.7em;
            padding: 3px;
            border-radius: 15px;
            text-align: center;
            background: #ffd966;
            margin-top: auto;
        }
        .day-badge.passed {
            background: #2ecc71;
            color: white;
        }
        .panel {
            position: fixed;
            top: 0;
            right: -500px;
            width: 450px;
            height: 100vh;
            background: white;
            box-shadow: -5px 0 20px rgba(0,0,0,0.2);
            transition: 0.3s;
            padding: 25px;
            z-index: 1000;
            overflow-y: auto;
        }
        .panel.open { right: 0; }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #1e3c72;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

            font-size: 30px;
            cursor: pointer;
            color: #888;
        }
        .date-box {
            background: #1e3c72;
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .term-box {
            background: #e3ecff;
            padding: 20px;
            border-radius: 10px;
            border-left: 8px solid #1e3c72;
            margin-bottom: 20px;
        }
        .term-word {
            font-size: 2em;
            font-weight: bold;
            color: #1e3c72;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 20px 0;
        }
        .option {
            border: 2px solid #d0dfff;
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
        }
        .option:hover {
            border-color: #1e3c72;
        }
        .option.selected {
            border-color: #1e3c72;
            background: #e3ecff;
        }
        .option.correct {
            border-color: #2ecc71;
            background: #e8f8f0;
        }
        .option.incorrect {
            border-color: #e74c3c;
            background: #fde9e8;
        }
        .marker {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid #1e3c72;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-weight: bold;
        }
        .selected .marker {
            background: #1e3c72;
            color: white;
        }
        .check-btn {
            background: #1e3c72;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            font-size: 1.1em;
            cursor: pointer;
            margin-bottom: 10px;
        }
        .check-btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
        }
        .reset-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            width: 100%;
            cursor: pointer;
        }
        .result {
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
        }
        .result.correct {
            background: #e8f8f0;
            color: #27ae60;
        }
        .result.incorrect {
            background: #fde9e8;
            color: #c0392b;
        }
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }
        .overlay.show { display: block; }
        /* ========== СТЫЛІ ДЛЯ ПРОФІЛЮ (МАДАЛЬНАЕ АКНО) ========== */
.modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.5);
    animation: fadeIn 0.3s;
}

.modal-content {
    background: white;
    margin: 5% auto;
    padding: 30px;
    border-radius: 20px;
    max-width: 500px;
    position: relative;
    animation: slideIn 0.3s;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes slideIn {
    from { transform: translateY(-50px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

.achievement-badge {
    background: linear-gradient(135deg, #ffd966, #ffb347);
    color: #1e3c72;
    padding: 8px 15px;
    border-radius: 50px;
    font-size: 0.9em;
    font-weight: bold;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    display: inline-block;
    margin: 5px;
}
        @media (max-width: 700px) {
            .panel { width: 100%; right: -100%; }
            .day { min-height: 75px; font-size: 0.9em; }
        }

        let results = JSON.parse(localStorage.getItem('res2026full')) || {};
        let currentMonth = 0, currentYear = 2026, selectedDate = null, selectedOpt = null;

        function getTest(m,d) { return tests[m+'-'+d]; }
        function isPassed(m,d) { return !!(results[m+'-'+d] && results[m+'-'+d].passed); }

        function updateStats() {
            let total = Object.keys(tests).length;
            let passed = Object.keys(results).length;
            let perc = total ? Math.round(passed*100/total) : 0;
            document.getElementById('total').textContent = total;
            document.getElementById('passed').textContent = passed;
            document.getElementById('percent').textContent = perc+'%';
        }

        // ========== КАЛЯНДАР ==========
        function renderWeekdays() {
            let html = '';
            weekdays.forEach(d => html += `<div class="weekday">${d}</div>`);
            document.getElementById('weekdays').innerHTML = html;
        }

        function renderCalendar() {
            let daysDiv = document.getElementById('days');
            daysDiv.innerHTML = '';
            let first = new Date(2026, currentMonth, 1).getDay();
            let daysInMonth = new Date(2026, currentMonth+1, 0).getDate();
            let empty = (first === 0) ? 6 : first-1;
            for(let i=0; i<empty; i++) daysDiv.innerHTML += '<div class="day" style="opacity:0.3;background:#eee"></div>';
            for(let d=1; d<=daysInMonth; d++) {
                let test = getTest(currentMonth, d) || {term:"вольны", emoji:"📅", red:false};
                let passed = isPassed(currentMonth, d);
                let cls = 'day' + (test.red ? ' red' : '');
                daysDiv.innerHTML += `
                    <div class="${cls}" onclick="openPanel(${currentMonth},${d})">
                        <div class="day-number"><span>${test.emoji}</span>${d}</div>
                        <div class="day-term">${test.term}</div>
                        <div class="day-badge ${passed ? 'passed' : ''}">${passed ? '✓ пройдзена' : '📝 тэст'}</div>
                    </div>
                `;
            }
        }

        function changeMonth(delta) {
            currentMonth += delta;
            if(currentMonth<0) currentMonth=11;
            if(currentMonth>11) currentMonth=0;
            document.getElementById('monthTitle').textContent = months[currentMonth]+' 2026';
            renderCalendar();
            document.querySelectorAll('.month-btn').forEach(b=>b.classList.remove('active'));
            let btn = document.getElementById('mb'+currentMonth);
            if(btn) btn.classList.add('active');
        }

        function goToMonth(m) {
            currentMonth = m;
            document.getElementById('monthTitle').textContent = months[currentMonth]+' 2026';
            renderCalendar();
            document.querySelectorAll('.month-btn').forEach(b=>b.classList.remove('active'));
            document.getElementById('mb'+m).classList.add('active');
        }

        function renderMonthButtons() {
            let html = '';
            months.forEach((m,i) => html += `<button class="month-btn ${i===currentMonth?'active':''}" id="mb${i}" onclick="goToMonth(${i})">${m.slice(0,3)}</button>`);
            document.getElementById('monthBtns').innerHTML = html;
        }

        // ========== ПАНЭЛЬ ==========
        function openPanel(m,d) {
            let test = getTest(m,d) || {term:"вольны дзень", emoji:"📅", desc:"", q:"Які сёння дзень?", opts:["Добры","Цудоўны","Выдатны","Усе"], correct:3};
            selectedDate = m+'-'+d;
            selectedOpt = null;
            document.getElementById('panelDate').textContent = d+' '+months[m]+' 2026';
            document.getElementById('panelWord').innerHTML = test.emoji+' '+test.term;
            document.getElementById('panelDesc').textContent = test.desc || '';
            document.getElementById('panelQuestion').textContent = '❓ '+(test.q || '');
            
            // Ствараем варыянты адказаў
            let optsDiv = document.getElementById('panelOptions');
            optsDiv.innerHTML = '';
            test.opts.forEach((opt,i) => {
                let optDiv = document.createElement('div');
                optDiv.className = 'option';
                optDiv.id = 'opt'+i;
                optDiv.onclick = function() { selectOption(i); };
                
                let marker = document.createElement('div');
                marker.className = 'marker';
                marker.textContent = String.fromCharCode(65+i);
                
                let textDiv = document.createElement('div');
                textDiv.textContent = opt;
                
                optDiv.appendChild(marker);
                optDiv.appendChild(textDiv);
                optsDiv.appendChild(optDiv);
            });
            
            document.getElementById('panelResult').innerHTML = '';
            document.getElementById('panelResult').className = 'result';
            document.getElementById('checkBtn').disabled = true;
            document.getElementById('panel').classList.add('open');
            document.getElementById('overlay').classList.add('show');
        }

        function closePanel() {
            document.getElementById('panel').classList.remove('open');
            document.getElementById('overlay').classList.remove('show');
        }

        function selectOption(i) {
            // Здымаем вылучэнне з усіх
            for(let j=0; j<4; j++) {
                let opt = document.getElementById('opt'+j);
                if(opt) opt.classList.remove('selected');
            }
            // Вылучаем выбраны
            let opt = document.getElementById('opt'+i);
            if(opt) opt.classList.add('selected');
            selectedOpt = i;
            document.getElementById('checkBtn').disabled = false;
        }

        function resetTest() {
            selectedOpt = null;
            for(let j=0; j<4; j++) {
                let opt = document.getElementById('opt'+j);
                if(opt) opt.classList.remove('selected','correct','incorrect');
            }
            document.getElementById('panelResult').innerHTML = '';
            document.getElementById('panelResult').className = 'result';
            document.getElementById('checkBtn').disabled = true;
        }
// ========== СІСТЭМА ДАСЯГНЕННЯЎ ==========
function addAchievement(id, name) {
    if (!userStats.achievements.includes(id)) {
        userStats.achievements.push(id);
        showNotification(`🏆 Дасягненне: ${name}`);
        // Бонусныя балы за дасягненне
        if (id === 'streak_7') addPoints(20);
        else if (id === 'streak_30') addPoints(50);
        else if (id === 'streak_100') addPoints(100);
    }
}

// ========== СІСТЭМА СТРЫКА (ДЗЁН ЗАПАР) ==========
function updateStreak() {
    const today = new Date().toDateString();
    
    if (!userStats.lastVisit) {
        userStats.streak = 1;
    } else {
        const lastDate = new Date(userStats.lastVisit);
        const currentDate = new Date();
        
        const diffTime = Math.abs(currentDate - lastDate);
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        
        if (diffDays === 1) {
            userStats.streak++;
            
            // Дасягненні за стрык
            if (userStats.streak === 7) {
                addAchievement('streak_7', '🎯 7 дзён запар');
            } else if (userStats.streak === 30) {
                addAchievement('streak_30', '🔥 30 дзён запар');
            } else if (userStats.streak === 100) {
                addAchievement('streak_100', '⚡ 100 дзён запар');
            }
        } else if (diffDays > 1) {
            userStats.streak = 1;
        }
    }
    
    userStats.lastVisit = today;
    localStorage.setItem('userStats', JSON.stringify(userStats));
    updateStatsDisplay();
}

<script>

// ========== СІСТЭМА БАЛАЎ І ЎЗРОЎНЯЎ ==========
let userStats = JSON.parse(localStorage.getItem('userStats')) || {
    points: 0,
    level: 1,
    daysCompleted: 0,
    achievements: [],
    streak: 0,
    lastVisit: null
};

const levelThresholds = [0, 100, 250, 500, 1000, 2000, 3500, 5000, 7500, 10000];
const levelNames = [
    "Пачатковец", "Даследчык", "Знаўца", "Эксперт", "Майстар",
    "Прафесар", "Акадэмік", "Легенда", "Міф", "Бог IT"
];

// ========== ФУНКЦЫІ ДЛЯ БАЛАЎ ==========
function addPoints(points) {
    userStats.points += points;
    
    // Праверка павышэння ўзроўню
    let newLevel = 1;
    for (let i = 0; i < levelThresholds.length; i++) {
        if (userStats.points >= levelThresholds[i]) {
            newLevel = i + 1;
        }
    }
    
    if (newLevel > userStats.level) {
        userStats.level = newLevel;
        showNotification(`🎉 Віншую! Ты дасягнуў ${newLevel} ўзроўню: ${levelNames[newLevel-1]}`);
    }
    
    localStorage.setItem('userStats', JSON.stringify(userStats));
    updateStatsDisplay();
}

function showNotification(message) {
    const notification = document.createElement('div');
    notification.style.cssText = `
        position: fixed;
        top: 20px;
        right: 20px;
        background: #1e3c72;
        color: white;
        padding: 15px 25px;
        border-radius: 10px;
        border-left: 5px solid #ffd966;
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        z-index: 10000;
        animation: slideIn 0.5s;
    `;
    notification.textContent = message;
    document.body.appendChild(notification);
    
    setTimeout(() => {
        notification.style.animation = 'slideOut 0.5s';
        setTimeout(() => notification.remove(), 500);
    }, 3000);
}

function updateStatsDisplay() {
    // Ствараем або абнаўляем панэль статыстыкі
    let statsDiv = document.getElementById('userStats');
    if (!statsDiv) {
        statsDiv = document.createElement('div');
        statsDiv.id = 'userStats';
        statsDiv.style.cssText = `
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 15px;
            border-radius: 15px;
            margin: 15px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 15px;
        `;
        document.querySelector('.container').insertBefore(statsDiv, document.querySelector('.month-nav'));
    }
    
    statsDiv.innerHTML = `
        <div class="stat-item">
            <div class="stat-number">${userStats.points}</div>
            <div>балаў</div>
        </div>
        <div class="stat-item">
            <div class="stat-number">${userStats.level}</div>
            <div>ўзровень</div>
            <div style="font-size:0.8em">${levelNames[userStats.level-1]}</div>
        </div>
        <div class="stat-item">
            <div class="stat-number">${userStats.daysCompleted}</div>
            <div>дзён</div>
        </div>
        <div class="stat-item">
            <div class="stat-number">${userStats.streak}</div>
            <div>дзён запар</div>
        </div>
        <div class="stat-item">
            <div class="stat-number">${Math.round((userStats.daysCompleted/365)*100)}%</div>
            <div>прагрэс</div>
        </div>
    `;
}

// ========== СІСТЭМА СТРЫКА (ДЗЁН ЗАПАР) ==========
function updateStreak() {
    const today = new Date().toDateString();
    
    if (!userStats.lastVisit) {
        userStats.streak = 1;
    } else {
        const lastDate = new Date(userStats.lastVisit);
        const currentDate = new Date();
        
        const diffTime = Math.abs(currentDate - lastDate);
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        
        if (diffDays === 1) {
            userStats.streak++;
        } else if (diffDays > 1) {
            userStats.streak = 1;
        }
    }
    
    userStats.lastVisit = today;
    localStorage.setItem('userStats', JSON.stringify(userStats));
    updateStatsDisplay();
}
// ========== ФУНКЦЫІ ДЛЯ ПРОФІЛЮ ==========
function openProfile() {
    updateProfileStats();
    document.getElementById('profileModal').style.display = 'block';
}

function closeProfile() {
    document.getElementById('profileModal').style.display = 'none';
}

function updateProfileStats() {
    document.getElementById('profilePoints').textContent = userStats.points;
    document.getElementById('profileDays').textContent = userStats.daysCompleted;
    document.getElementById('profileStreak').textContent = userStats.streak;
    
    document.getElementById('profileLevel').innerHTML = `🎓 Узровень ${userStats.level}: ${levelNames[userStats.level-1]}`;
    
    let currentLevelPoints = levelThresholds[userStats.level - 1];
    let nextLevelPoints = levelThresholds[userStats.level] || levelThresholds[levelThresholds.length-1];
    let pointsNeeded = nextLevelPoints - currentLevelPoints;
    let pointsProgress = userStats.points - currentLevelPoints;
    let progressPercent = Math.min(100, Math.round((pointsProgress / pointsNeeded) * 100));
    
    document.getElementById('progressBar').style.width = progressPercent + '%';
    document.getElementById('currentPoints').textContent = userStats.points + ' балаў';
    document.getElementById('nextLevelPoints').textContent = 'Мэта: ' + nextLevelPoints + ' балаў';
    
    let achievementsDiv = document.getElementById('achievementsList');
    achievementsDiv.innerHTML = '';
    
    if (userStats.achievements.length === 0) {
        achievementsDiv.innerHTML = '<p style="color: #888; width: 100%; text-align: center;">Пакуль няма дасягненняў</p>';
    } else {
        userStats.achievements.forEach(ach => {
            let achievementNames = {
                'streak_7': '🎯 7 дзён запар',
                'streak_30': '🔥 30 дзён запар',
                'streak_100': '⚡ 100 дзён запар'
            };
            
            let badge = document.createElement('span');
            badge.className = 'achievement-badge';
            badge.textContent = achievementNames[ach] || ach;
            achievementsDiv.appendChild(badge);
        });
    }
}

function resetAllProgress() {
    if (confirm('⚠️ Ты ўпэўнены, што хочаш скінуць увесь прагрэс? Гэта дзеянне нельга адмяніць!')) {
        localStorage.removeItem('userStats');
        localStorage.removeItem('res2026full');
        location.reload();
    }
}
// ========== ПАЛІПШАНАЯ ФУНКЦЫЯ ПРАВЕРКІ АДКАЗУ ==========
function checkAnswer() {
    if(!selectedDate || selectedOpt===null) return;
    
    let test = tests[selectedDate];
    if(!test) return;
    
    let correct = (selectedOpt === test.correct);
    let resDiv = document.getElementById('panelResult');
    
    if(correct) {
        resDiv.innerHTML = '✅ Правільна! +10 балаў';
        resDiv.className = 'result correct';
        
        // Калі гэты дзень яшчэ не быў пройдзены
        if (!results[selectedDate]) {
            addPoints(10); // Дадаем 10 балаў
            userStats.daysCompleted++;
            
            // Захоўваем вынік
            results[selectedDate] = {passed: true};
            localStorage.setItem('res2026full', JSON.stringify(results));
            
            // Абнаўляем каляндар і статыстыку
            renderCalendar();
            updateStats();
            updateStatsDisplay();
        }
    } else {
        resDiv.innerHTML = '❌ Неправільна';
        resDiv.className = 'result incorrect';
    }
    
    // Падсвечванне варыянтаў
    for(let j=0; j<4; j++) {
        let opt = document.getElementById('opt'+j);
        if(opt) {
            if(j === test.correct) opt.classList.add('correct');
            else if(j === selectedOpt && !correct) opt.classList.add('incorrect');
        }
    }
    document.getElementById('checkBtn').disabled = true;
}

// ========== АНІМАЦЫЯ ==========
const style = document.createElement('style');
style.textContent = `
    @keyframes slideIn {
        from { transform: translateX(100%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideOut {
        from { transform: translateX(0); opacity: 1; }
        to { transform: translateX(100%); opacity: 0; }
    }
`;
document.head.appendChild(style);

</script>
